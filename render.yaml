services:
  - type: web
    name: memorias-com-amor
    runtime: image
    repo: https://github.com/Mayza414/memorias-com-amor
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: ALLOWED_ORIGINS
        value: https://memorias-com-amor.onrender.com,https://seu-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: memorias-db
          property: connectionString

  - type: postgresql
    name: memorias-db
    plan: free
    region: oregon
